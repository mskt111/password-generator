<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор паролей</title>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'PT Sans', Arial, sans-serif;
    background: #f0f0f0;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
  }

  .wrapper {
    width: 100%;
    max-width: 500px;
  }

  h1 {
    font-size: 22px;
    color: #333;
    margin-bottom: 4px;
  }

  p.desc {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
  }

  .box {
    background: white;
    border: 1px solid #ccc;
    padding: 20px;
    max-width: 500px;
    margin-bottom: 16px;
  }

  label {
    font-size: 13px;
    color: #444;
    display: block;
    margin-bottom: 6px;
  }

  #passwordOut {
    width: 100%;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 8px;
    border: 1px solid #aaa;
    background: #fafafa;
    color: #222;
    box-sizing: border-box;
    margin-bottom: 8px;
    word-break: break-all;
    min-height: 40px;
  }

  button {
    font-size: 13px;
    padding: 6px 14px;
    background: #e0e0e0;
    border: 1px solid #aaa;
    cursor: pointer;
    margin-right: 6px;
    color: #333;
  }
  button:hover { background: #d0d0d0; }
  button:active { background: #c4c4c4; }

  .gen-btn {
    background: #4a90d9;
    color: white;
    border-color: #3a7abf;
    font-weight: bold;
  }
  .gen-btn:hover { background: #3a7abf; }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  input[type="range"] {
    width: 200px;
  }

  #lenDisplay {
    font-size: 13px;
    color: #555;
    min-width: 30px;
  }

  .checks label {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
    font-size: 13px;
    color: #444;
  }

  .strength-row {
    font-size: 12px;
    color: #666;
    margin-bottom: 10px;
  }

  #strengthBar {
    display: inline-block;
    height: 8px;
    width: 100px;
    background: #ddd;
    border: 1px solid #bbb;
    vertical-align: middle;
    position: relative;
    margin-left: 6px;
  }

  #strengthFill {
    display: block;
    height: 100%;
    width: 0%;
    background: #4a90d9;
    transition: width 0.2s;
  }

  #strengthLabel {
    margin-left: 6px;
    font-size: 12px;
    color: #555;
  }

  hr { border: none; border-top: 1px solid #ddd; margin: 14px 0; }

  .history-box {
    background: white;
    border: 1px solid #ccc;
    padding: 16px;
    max-width: 500px;
  }

  .history-box h3 {
    font-size: 14px;
    color: #444;
    margin-bottom: 10px;
    font-weight: normal;
  }

  #historyList {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #555;
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 140px;
    overflow-y: auto;
  }

  #historyList li {
    padding: 4px 6px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
  }

  #historyList li:hover { background: #f5f5f5; }

  #copyMsg {
    font-size: 12px;
    color: green;
    display: none;
    margin-left: 8px;
  }

  section-title {
    display: block;
    font-size: 13px;
    font-weight: bold;
    color: #444;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="wrapper">

<h1>Генератор паролей</h1>
<p class="desc">Создайте надёжный пароль для ваших аккаунтов.</p>

<div class="box">

  <label><b>Сгенерированный пароль:</b></label>
  <div id="passwordOut">—</div>

  <div>
    <button class="gen-btn" onclick="generate()">Сгенерировать</button>
    <button onclick="copyPw()">Копировать</button>
    <span id="copyMsg">✓ Скопировано!</span>
  </div>

  <div class="strength-row" style="margin-top: 10px;">
    Надёжность:
    <span id="strengthBar"><span id="strengthFill"></span></span>
    <span id="strengthLabel">—</span>
  </div>

  <hr>

  <label><b>Длина пароля:</b></label>
  <div class="row">
    <input type="range" id="lenRange" min="6" max="64" value="16" oninput="document.getElementById('lenDisplay').textContent=this.value">
    <span id="lenDisplay">16</span> символов
  </div>

  <hr>

  <label><b>Использовать символы:</b></label>
  <div class="checks">
    <label><input type="checkbox" id="useUpper" checked> Заглавные буквы (A–Z)</label>
    <label><input type="checkbox" id="useLower" checked> Строчные буквы (a–z)</label>
    <label><input type="checkbox" id="useNums"  checked> Цифры (0–9)</label>
    <label><input type="checkbox" id="useSyms">  Спецсимволы (!@#$%...)</label>
  </div>

  <hr>

  <label><b>Дополнительно:</b></label>
  <div class="checks">
    <label><input type="checkbox" id="noAmbig"> Исключить похожие символы (0, O, l, 1)</label>
    <label><input type="checkbox" id="noRepeat"> Не повторять символы</label>
  </div>

</div>

<div class="history-box">
  <h3>История паролей &nbsp;<button style="font-size:11px;padding:2px 8px;" onclick="clearHistory()">Очистить</button></h3>
  <ul id="historyList"><li style="color:#aaa; cursor:default;">Пока пусто</li></ul>
</div>

</div>

<script>
  const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const LOWER = 'abcdefghijklmnopqrstuvwxyz';
  const NUMS  = '0123456789';
  const SYMS  = '!@#$%^&*()_+-=[]{}|;:,.<>?';
  const AMBIG = /[0Ol1Il]/;

  let history = [];
  let current = '';

  function rnd(str) {
    const a = new Uint32Array(1);
    crypto.getRandomValues(a);
    return str[a[0] % str.length];
  }

  function shuffle(s) {
    const a = s.split('');
    for (let i = a.length - 1; i > 0; i--) {
      const r = new Uint32Array(1);
      crypto.getRandomValues(r);
      const j = r[0] % (i + 1);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a.join('');
  }

  function generate() {
    let cs = '';
    if (document.getElementById('useUpper').checked) cs += UPPER;
    if (document.getElementById('useLower').checked) cs += LOWER;
    if (document.getElementById('useNums').checked)  cs += NUMS;
    if (document.getElementById('useSyms').checked)  cs += SYMS;
    if (!cs) { alert('Выберите хотя бы один тип символов!'); return; }

    const noAmbig  = document.getElementById('noAmbig').checked;
    const noRepeat = document.getElementById('noRepeat').checked;
    if (noAmbig) cs = cs.replace(AMBIG, '');
    if (!cs) { alert('Нет доступных символов после фильтра.'); return; }

    const len = parseInt(document.getElementById('lenRange').value);

    if (noRepeat && len > cs.length) {
      alert(`Нельзя сгенерировать ${len} уникальных символов из алфавита в ${cs.length} символов. Уменьшите длину или снимите флаг «Не повторять символы».`);
      return;
    }
    let pw = '';
    let attempts = 0;

    do {
      pw = '';
      const used = new Set();
      for (let i = 0; i < len; i++) {
        let ch, tries = 0;
        do { ch = rnd(cs); tries++; } while (noRepeat && used.has(ch) && tries < 200);
        if (noRepeat && used.has(ch)) break;
        pw += ch;
        used.add(ch);
      }
      attempts++;
    } while (pw.length < len && attempts < 500);

    if (pw.length < len) { alert('Не хватает уникальных символов.'); return; }
    pw = shuffle(pw);
    current = pw;

    document.getElementById('passwordOut').textContent = pw;
    document.getElementById('copyMsg').style.display = 'none';
    updateStrength(pw);
    addHistory(pw);
  }

  function copyPw() {
    if (!current) return;
    navigator.clipboard.writeText(current).then(() => {
      const m = document.getElementById('copyMsg');
      m.style.display = 'inline';
      setTimeout(() => m.style.display = 'none', 2000);
    });
  }

  function updateStrength(pw) {
    let s = 0;
    if (pw.length >= 8)  s++;
    if (pw.length >= 12) s++;
    if (pw.length >= 20) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[a-z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;

    const pct = Math.round((s / 7) * 100);
    const fill = document.getElementById('strengthFill');
    const lbl  = document.getElementById('strengthLabel');
    fill.style.width = pct + '%';

    if (s <= 2)      { fill.style.background = '#e74c3c'; lbl.style.color = '#e74c3c'; lbl.textContent = 'Слабый'; }
    else if (s <= 4) { fill.style.background = '#e67e22'; lbl.style.color = '#e67e22'; lbl.textContent = 'Средний'; }
    else if (s <= 6) { fill.style.background = '#2ecc71'; lbl.style.color = '#2ecc71'; lbl.textContent = 'Сильный'; }
    else             { fill.style.background = '#27ae60'; lbl.style.color = '#27ae60'; lbl.textContent = 'Надёжный'; }
  }

  function addHistory(pw) {
    const time = new Date().toLocaleTimeString('ru');
    history.unshift({ pw, time });
    if (history.length > 10) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const ul = document.getElementById('historyList');
    if (!history.length) { ul.innerHTML = '<li style="color:#aaa;cursor:default;">Пока пусто</li>'; return; }
    ul.innerHTML = '';
    history.forEach((h) => {
      const li = document.createElement('li');
      const spanPw = document.createElement('span');
      const spanTime = document.createElement('span');
      spanPw.textContent = h.pw;
      spanTime.textContent = h.time;
      spanTime.style.color = '#aaa';
      li.appendChild(spanPw);
      li.appendChild(spanTime);
      li.addEventListener('click', () => navigator.clipboard.writeText(h.pw));
      ul.appendChild(li);
    });
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  generate();
</script>
</body>
</html>
